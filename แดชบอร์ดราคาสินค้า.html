function esc(str) {
  return String(str == null ? "" : str).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

function loadJSON(key, fallback) {
  try {
    var v = JSON.parse(localStorage.getItem(key));
    return v == null ? fallback : v;
  } catch (e) {
    return fallback;
  }
}
function saveJSON(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
}

function dataUrlToBlob(dataUrl) {
  var parts = dataUrl.split(",");
  var mimeMatch = parts[0].match(/:(.*?);/);
  var mime = mimeMatch ? mimeMatch[1] : "application/octet-stream";
  var binary = atob(parts[1]);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type: mime });
}

function resizeImageFile(file, maxDim, quality, callback) {
  var reader = new FileReader();
  reader.onload = function () {
    var image = new Image();
    image.onload = function () {
      var w = image.width, h = image.height;
      var scale = Math.min(1, maxDim / Math.max(w, h));
      var cw = Math.max(1, Math.round(w * scale));
      var ch = Math.max(1, Math.round(h * scale));
      var canvas = document.createElement("canvas");
      canvas.width = cw;
      canvas.height = ch;
      var ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, cw, ch);
      ctx.drawImage(image, 0, 0, cw, ch);
      try {
        callback(canvas.toDataURL("image/jpeg", quality));
      } catch (e) {
        callback(reader.result);
      }
    };
    image.onerror = function () { callback(reader.result); };
    image.src = reader.result;
  };
  reader.readAsDataURL(file);
}

  clearTimeout(this._renderTimer);
  this._renderTimerStart = null;
  Object.assign(this.state, typeof patch === "function" ? patch(this.state) : patch);
  this.render();
};

Dashboard.prototype.handleClick = function (e) {
  var t = e.target.closest("[data-action]");
  if (!t) return;
  var action = t.dataset.action;
  var d = t.dataset;
  switch (action) {
    case "logout": this.onLogout(); break;
    case "nav": this.setState({ page: d.page }); break;
    case "toggle-auth-mode": e.preventDefault(); this.onToggleMode(); break;
    case "set-view": this.setState({ view: d.view }); break;
    case "set-category": this.setState({ category: d.category }); break;
    case "toggle-cat-sidebar": this.setState(function (s2) { return { catSidebarCollapsed: !s2.catSidebarCollapsed }; }); break;
    case "toggle-calc-sidebar": this.setState(function (s2) { return { calcSidebarCollapsed: !s2.calcSidebarCollapsed }; }); break;
    case "calc-set-type": this.setState({ page: "calc", calcProductType: d.type }); break;
    case "toggle-add-form": this.onToggleAddForm(); break;
    case "start-edit": this.startEdit(d.id); break;
    case "save-edit": this.saveEdit(d.id); break;
    case "clear-new-prod-image": this.setState({ newProdImage: "" }); break;
    case "clear-edit-image": this.setState({ editImage: "" }); break;
    case "open-folder": this.openFolder(d.kind, d.id); break;
    case "close-folder": this.closeFolder(d.kind); break;
    case "remove-folder": this.removeFolder(d.kind, d.id); break;
    case "remove-file": this.removeFile(d.kind, d.folderId, d.fileId); break;
    case "remove-user": this.removeUser(d.username); break;
    case "remove-contact": this.removeContact(d.id); break;
  }
};

Dashboard.prototype.handleSubmit = function (e) {
  var form = e.target.closest("form[data-form]");
  if (!form) return;
  e.preventDefault();
  var kind = form.dataset.form;
  switch (kind) {
    case "auth": this.onSubmitAuth(); break;
    case "add-product": this.onAddProduct(); break;
    case "add-user": this.onAddUser(); break;
    case "add-contact": this.onAddContact(); break;
    case "add-folder":
      this.addFolder(form.dataset.kind);
      break;
  }
};

Dashboard.prototype._scheduleRender = function (fn) {
  var self = this;
  var now = Date.now();
  if (!this._renderTimerStart) this._renderTimerStart = now;
  clearTimeout(this._renderTimer);
  if (now - this._renderTimerStart >= 500) {
    this._renderTimerStart = null;
    fn.call(this);
    return;
  }
  this._renderTimer = setTimeout(function () {
    self._renderTimerStart = null;
    fn.call(self);
  }, 150);
};

Dashboard.prototype.handleFieldChange = function (e) {
  var rowEl = e.target.closest("[data-calc-row]");
  if (rowEl) {
    var idx = parseInt(rowEl.dataset.calcRow, 10);
    var field = rowEl.dataset.calcField;
    var storeKey = rowEl.dataset.calcStore || "calcRows";
    this.state[storeKey][idx][field] = rowEl.value;
    this._scheduleRender(this.renderCalcOnly);
    return;
  }
  var el = e.target.closest("[data-bind]");
  if (!el || el.type === "file") return;
  var key = el.dataset.bind;
  this.state[key] = el.value;
  if (el.dataset.clear) this.state[el.dataset.clear] = "";
  var isCalcField = key.indexOf("calc") === 0;
  this._scheduleRender(isCalcField ? this.renderCalcOnly : this.render);
};

Dashboard.prototype.handleChange = function (e) {
  if (e.target.type === "file" && e.target.dataset.action === "upload-file") {
    var kind = e.target.dataset.kind;
    var file = e.target.files && e.target.files[0];
    if (file) this.uploadFile(kind, file);
    e.target.value = "";
    return;
  }
  if (e.target.type === "file" && e.target.dataset.action === "upload-new-prod-image") {
    var file2 = e.target.files && e.target.files[0];
    if (file2) this.uploadProductImage(file2, "newProdImage");
    e.target.value = "";
    return;
  }
  if (e.target.type === "file" && e.target.dataset.action === "upload-edit-image") {
    var file3 = e.target.files && e.target.files[0];
    if (file3) this.uploadProductImage(file3, "editImage");
    e.target.value = "";
    return;
  }
  this.handleFieldChange(e);
};

/* ---- auth ---- */

Dashboard.prototype.onToggleMode = function () {
  this.setState(function (s) {
    return { authMode: s.authMode === "login" ? "register" : "login", authError: "", password: "", confirmPassword: "" };
  });
};

Dashboard.prototype.onSubmitAuth = function () {
  var s = this.state;
  var u = s.username.trim();
  if (s.authMode === "login") {
    if (!u || !s.password.trim()) { this.setState({ authError: "กรุณากรอกชื่อผู้ใช้และรหัสผ่าน" }); return; }
    var match = s.users.find(function (usr) { return usr.username === u && usr.password === s.password; });
    if (!match) { this.setState({ authError: "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง" }); return; }
    this.setState({ loggedIn: true, authError: "" });
    return;
  }
  if (!u || !s.password.trim()) { this.setState({ authError: "กรุณากรอกชื่อผู้ใช้และรหัสผ่าน" }); return; }
  if (s.password !== s.confirmPassword) { this.setState({ authError: "รหัสผ่านไม่ตรงกัน" }); return; }
  if (s.users.some(function (usr) { return usr.username === u; })) { this.setState({ authError: "ชื่อผู้ใช้นี้มีอยู่แล้ว" }); return; }
  this.setState(function (s2) {
    var users = s2.users.concat([{ username: u, password: s2.password, role: "viewer" }]);
    saveJSON(STORAGE.users, users);
    return { users: users, loggedIn: true, authError: "" };
  });
};

Dashboard.prototype.onLogout = function () {
  this.setState({ loggedIn: false, password: "", confirmPassword: "", authMode: "login" });
};

/* ---- products ---- */

Dashboard.prototype.getMergedProducts = function () {
  var overrides = this.state.overrides;
  return RAW_PRODUCTS.concat(this.state.customProducts).map(function (p) {
    var ov = overrides[p.id];
    if (!ov) return p;
    return Object.assign({}, p, {
      name: ov.name != null ? ov.name : p.name,
      unit: ov.unit != null ? ov.unit : p.unit,
      price: ov.price != null ? ov.price : p.price,
      vat: ov.vat != null ? ov.vat : p.vat,
      image: ov.image !== undefined ? ov.image : p.image,
    });
  });
};

Dashboard.prototype.computeProducts = function () {
  var s = this.state;
  var q = s.search.trim().toLowerCase();
  var withOverrides = this.getMergedProducts();

  var list = withOverrides.filter(function (p) {
    var matchesCat = s.category === "all" || p.cat === s.category;
    var matchesQ = !q || p.name.toLowerCase().indexOf(q) !== -1 || p.sku.toLowerCase().indexOf(q) !== -1;
    return matchesCat && matchesQ;
  });

  if (s.sortBy === "name") list = list.slice().sort(function (a, b) { return a.name.localeCompare(b.name, "th"); });
  if (s.sortBy === "price_asc") list = list.slice().sort(function (a, b) { return a.price - b.price; });
  if (s.sortBy === "price_desc") list = list.slice().sort(function (a, b) { return b.price - a.price; });

  return list.map(function (p) {
    var im = img(p.cat);
    return {
      id: p.id, name: p.name, sku: p.sku, categoryLabel: CAT_LABEL[p.cat], unit: p.unit,
      priceDisplay: fmt(p.price),
      oldPriceDisplay: p.oldPrice ? fmt(p.oldPrice) : "",
      hasDiscount: !!p.oldPrice,
      vatLabel: p.vat === "novat" ? "NO VAT" : "VAT",
      vatBadgeBg: p.vat === "novat" ? "oklch(0.93 0.03 85)" : "oklch(0.92 0.05 155)",
      vatBadgeColor: p.vat === "novat" ? "oklch(0.45 0.1 80)" : "oklch(0.4 0.09 155)",
      imgBg: im.bg, imgStripe: im.stripe,
      image: p.image || "",
      isEditing: s.editingId === p.id,
    };
  });
};

Dashboard.prototype.startEdit = function (id) {
  var p = this.getMergedProducts().find(function (x) { return x.id === id; });
  if (!p) return;
  this.setState({ editingId: p.id, editName: p.name, editPrice: String(p.price), editUnit: p.unit, editVat: p.vat || "vat", editImage: p.image || "" });
};

Dashboard.prototype.saveEdit = function (id) {
  var s = this.state;
  var price = parseFloat(s.editPrice);
  var name = s.editName.trim();
  var unit = s.editUnit.trim();
  var editVat = s.editVat;
  var editImage = s.editImage;
  this.setState(function (s2) {
    var isCustom = s2.customProducts.some(function (cp) { return cp.id === id; });
    if (isCustom) {
      var customProducts = s2.customProducts.map(function (cp) {
        if (cp.id !== id) return cp;
        return Object.assign({}, cp, {
          name: name || cp.name, unit: unit || cp.unit,
          price: isNaN(price) ? cp.price : price, vat: editVat, image: editImage,
        });
      });
      saveJSON(STORAGE.customProducts, customProducts);
      return { customProducts: customProducts, editingId: null };
    }
    var prev = s2.overrides[id] || {};
    var overrides = Object.assign({}, s2.overrides);
    overrides[id] = {
      name: name || prev.name, unit: unit || prev.unit,
      price: isNaN(price) ? prev.price : price, vat: editVat, image: editImage,
    };
    saveJSON(STORAGE.overrides, overrides);
    return { overrides: overrides, editingId: null };
  });
};

Dashboard.prototype.uploadProductImage = function (file, stateKey) {
  var self = this;
  resizeImageFile(file, 720, 0.85, function (dataUrl) {
    var patch = {};
    patch[stateKey] = dataUrl;
    self.setState(patch);
  });
};

Dashboard.prototype.onToggleAddForm = function () {
  this.setState(function (s) { return { showAddForm: !s.showAddForm, newProdError: "" }; });
};

Dashboard.prototype.onAddProduct = function () {
  var s = this.state;
  var name = s.newProdName.trim();
  var unit = s.newProdUnit.trim();
  var price = parseFloat(s.newProdPrice);
  if (!name || !unit || isNaN(price) || price < 0) {
    this.setState({ newProdError: "กรุณากรอกข้อมูลให้ครบและถูกต้อง" });
    return;
  }
  var id = "custom-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
  var sku = "CUS-" + String(Date.now()).slice(-5);
  var product = { id: id, cat: s.newProdCat, name: name, sku: sku, price: price, oldPrice: null, unit: unit, stock: 0, vat: s.newProdVat, image: s.newProdImage || "" };
  this.setState(function (s2) {
    var customProducts = s2.customProducts.concat([product]);
    saveJSON(STORAGE.customProducts, customProducts);
    return { customProducts: customProducts, showAddForm: false, newProdName: "", newProdPrice: "", newProdUnit: "", newProdVat: "vat", newProdImage: "", newProdError: "" };
  });
};

/* ---- folders (concrete / tis, shared logic) ---- */

Dashboard.prototype._folderKeys = function (kind) {
  return kind === "concrete"
    ? { stateKey: "concreteFolders", activeKey: "activeConcreteFolderId", nameKey: "newConcreteFolderName", storageKey: STORAGE.concreteFolders, idPrefix: "cf" }
    : { stateKey: "tisFolders", activeKey: "activeTisFolderId", nameKey: "newTisFolderName", storageKey: STORAGE.tisFolders, idPrefix: "tis" };
};

Dashboard.prototype.getBlobUrl = function (file) {
  if (!this._blobUrlCache) this._blobUrlCache = {};
  if (!this._blobUrlCache[file.id]) {
    try {
      this._blobUrlCache[file.id] = URL.createObjectURL(dataUrlToBlob(file.url));
    } catch (e) {
      return file.url;
    }
  }
  return this._blobUrlCache[file.id];
};

Dashboard.prototype.revokeBlobUrl = function (fileId) {
  if (this._blobUrlCache && this._blobUrlCache[fileId]) {
    URL.revokeObjectURL(this._blobUrlCache[fileId]);
    delete this._blobUrlCache[fileId];
  }
};

Dashboard.prototype.addFolder = function (kind) {
  var k = this._folderKeys(kind);
  var name = (this.state[k.nameKey] || "").trim();
  if (!name) return;
  var id = k.idPrefix + "-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
  var self = this;
  this.setState(function (s) {
    var folders = s[k.stateKey].concat([{ id: id, name: name, files: [] }]);
    saveJSON(k.storageKey, folders);
    var patch = {};
    patch[k.stateKey] = folders;
    patch[k.nameKey] = "";
    return patch;
  });
};

Dashboard.prototype.removeFolder = function (kind, id) {
  var k = this._folderKeys(kind);
  this.setState(function (s) {
    var folders = s[k.stateKey].filter(function (f) { return f.id !== id; });
    saveJSON(k.storageKey, folders);
    var patch = {};
    patch[k.stateKey] = folders;
    if (s[k.activeKey] === id) patch[k.activeKey] = null;
    return patch;
  });
};

Dashboard.prototype.openFolder = function (kind, id) {
  var k = this._folderKeys(kind);
  var patch = {};
  patch[k.activeKey] = id;
  this.setState(patch);
};

Dashboard.prototype.closeFolder = function (kind) {
  var k = this._folderKeys(kind);
  var patch = {};
  patch[k.activeKey] = null;
  this.setState(patch);
};

Dashboard.prototype.uploadFile = function (kind, file) {
  var k = this._folderKeys(kind);
  var activeId = this.state[k.activeKey];
  if (!activeId) return;
  var sizeKb = file.size / 1024;
  var sizeLabel = sizeKb > 1024 ? (sizeKb / 1024).toFixed(1) + " MB" : sizeKb.toFixed(0) + " KB";
  var fileId = Date.now() + "-" + Math.random().toString(36).slice(2, 7);
  var self = this;
  var reader = new FileReader();
  reader.onload = function () {
    var url = reader.result;
    self.setState(function (s) {
      var folders = s[k.stateKey].map(function (f) {
        if (f.id !== activeId) return f;
        return Object.assign({}, f, { files: f.files.concat([{ id: fileId, name: file.name, sizeLabel: sizeLabel, url: url }]) });
      });
      saveJSON(k.storageKey, folders);
      var patch = {};
      patch[k.stateKey] = folders;
      return patch;
    });
  };
  reader.readAsDataURL(file);
};

Dashboard.prototype.removeFile = function (kind, folderId, fileId) {
  var k = this._folderKeys(kind);
  this.revokeBlobUrl(fileId);
  this.setState(function (s) {
    var folders = s[k.stateKey].map(function (f) {
      if (f.id !== folderId) return f;
      return Object.assign({}, f, { files: f.files.filter(function (x) { return x.id !== fileId; }) });
    });
    saveJSON(k.storageKey, folders);
    var patch = {};
    patch[k.stateKey] = folders;
    return patch;
  });
};

/* ---------- render ---------- */

Dashboard.prototype.render = function () {
  var active = document.activeElement;
  var focusId = active && active.id ? active.id : null;
  var selStart = active && "selectionStart" in active ? active.selectionStart : null;
  var selEnd = active && "selectionEnd" in active ? active.selectionEnd : null;

  this.root.innerHTML = this.state.loggedIn ? this.renderDashboard() : this.renderLogin();

  if (focusId) {
    var el = document.getElementById(focusId);
    if (el) {
      el.focus();
      if (selStart != null && "setSelectionRange" in el) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
      }
    }
  }
};

Dashboard.prototype.renderCalcOnly = function () {
  var container = document.getElementById("calc-container");
  if (!container) { this.render(); return; }

  var active = document.activeElement;
  var focusId = active && active.id ? active.id : null;
  var focusSelector = (!focusId && active && active.dataset && active.dataset.calcRow != null)
    ? '[data-calc-row="' + active.dataset.calcRow + '"][data-calc-field="' + active.dataset.calcField + '"][data-calc-store="' + (active.dataset.calcStore || "calcRows") + '"]'
    : null;
  var selStart = active && "selectionStart" in active ? active.selectionStart : null;
  var selEnd = active && "selectionEnd" in active ? active.selectionEnd : null;
  var oldScrollBox = container.querySelector(".list-table");
  var tableScrollLeft = oldScrollBox ? oldScrollBox.scrollLeft : null;
  var pageScrollX = window.scrollX, pageScrollY = window.scrollY;

  container.innerHTML = this.renderCalcPage();

  var el = focusId ? document.getElementById(focusId) : (focusSelector ? container.querySelector(focusSelector) : null);
  if (el) {
    el.focus();
    if (selStart != null && "setSelectionRange" in el) {
      try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
    }
  }
  if (tableScrollLeft != null) {
    var newScrollBox = container.querySelector(".list-table");
    if (newScrollBox) newScrollBox.scrollLeft = tableScrollLeft;
  }
  window.scrollTo(pageScrollX, pageScrollY);
};

Dashboard.prototype.renderDashboard = function () {

  var page = s.page;
  var navItem = function (label, icon, pageKey, active) {

Dashboard.prototype.computeCalcRows = function () {
  var s = this.state;
  var plateWidth = parseFloat(s.calcPlateWidth) || 0;
  var weightPerSqm = parseFloat(s.calcWeightPerSqm) || 0;
  return s.calcRows.map(function (r, i) {
    var length = parseFloat(r.length);
    var qty = parseInt(r.qty, 10);
    var discount = parseFloat(r.discount);
    var price = parseFloat(r.price);
    var hasData = !isNaN(length) && length > 0 && !isNaN(qty) && qty > 0 && !isNaN(price) && price > 0;
    if (!hasData) {
      return { index: i + 1, label: r.label, length: r.length, qty: r.qty, discount: r.discount, price: r.price, hasData: false };
    }
    var d = isNaN(discount) ? 0 : discount;
    var needsApproval = d > 7;
    var discountedPrice = Math.round(price * (1 - d / 100));
    var sqmPerSheet = plateWidth * length;
    var pricePerSheet = discountedPrice * sqmPerSheet;
    var weightPerSheet = weightPerSqm * sqmPerSheet;
    return {
      index: i + 1, label: r.label, length: r.length, qty: r.qty, discount: r.discount, price: r.price,
      hasData: true, needsApproval: needsApproval,
      discountedPrice: discountedPrice, sqmPerSheet: sqmPerSheet, pricePerSheet: pricePerSheet,
      weightPerSheet: weightPerSheet, totalSqm: sqmPerSheet * qty, totalWeight: weightPerSheet * qty, totalPrice: pricePerSheet * qty,
    };
  });
};

  var totalTon = totalWeightKg / 1000;
  var rows = TRUCK_TYPES.map(function (t) {
    var trips = totalTon > 0 ? Math.ceil(totalTon / t.maxTon) : 0;
    return { name: t.name, maxTon: t.maxTon, trips: trips };
  });
  var recommended = null;
  if (totalTon > 0) {
    recommended = rows.filter(function (r) { return r.trips === 1; })[0] || rows[rows.length - 1];
  }
  return { rows: rows, recommended: recommended };
};

Dashboard.prototype.computeSteelRows = function () {
  return this.state.calcSteelRows.map(function (r, i) {
    var product = STEEL_PRODUCTS_BY_ID[r.product];
    var qty = parseFloat(r.qty);
    var qtyValid = !isNaN(qty) && qty > 0;
    var sellPrice = parseFloat(r.sellPrice); if (isNaN(sellPrice)) sellPrice = 0;
    var row = {
      index: i + 1, product: r.product, qty: r.qty, sellPrice: r.sellPrice,
      hasProduct: !!product, unit: product ? product.unit : "", weightPerUnit: product ? product.weight : null,
      hasTotals: !!product && qtyValid,
    };
    if (row.hasTotals) {
      row.totalWeight = product.weight * qty;
      row.totalSell = sellPrice * qty;
    }
    return row;
  });
};

    cells.push('<div style="font-size:11px; color:oklch(0.5 0.01 60);">' + r.index + '</div>');
    cells.push('<select data-calc-row="' + (r.index - 1) + '" data-calc-field="product" data-calc-store="calcStirrupRows" style="' + rowInputStyle + ' background:#fff;">' + productOptionsHtml(r.product) + '</select>');
    cells.push('<div style="font-size:11px;">' + (r.weightPerBundle != null ? fmtN(r.weightPerBundle, 2) : "") + '</div>');
    cells.push('<input type="text" inputmode="numeric" data-calc-row="' + (r.index - 1) + '" data-calc-field="qty" data-calc-store="calcStirrupRows" value="' + esc(r.qty) + '" style="' + rowInputStyle + '" />');
    cells.push('<div style="font-size:11px;">' + (r.hasTotals ? fmtN(r.totalWeight, 2) : "") + '</div>');
    cells.push('<input type="text" inputmode="decimal" data-calc-row="' + (r.index - 1) + '" data-calc-field="sellPrice" data-calc-store="calcStirrupRows" value="' + esc(r.sellPrice) + '" style="' + rowInputStyle + '" />');
    cells.push('<div style="font-size:11px; font-weight:700; color:oklch(0.38 0.15 275);">' + (r.hasTotals ? fmtN(r.totalSell, 2) : "") + '</div>');
    return '<div class="stirrup-calc-row" style="display:grid; grid-template-columns:' + colWidths + '; gap:3px; align-items:center; padding:5px 8px; border-top:1px solid oklch(0.93 0.006 70);">' + cells.join("") + '</div>';
  }).join("");

  var totalsRow = '<div class="stirrup-calc-row" style="display:grid; grid-template-columns:' + colWidths + '; gap:3px; align-items:center; padding:8px 8px; border-top:2px solid oklch(0.85 0.01 60); background:oklch(0.96 0.006 70); font-weight:700; font-size:11px;">' +
    '<div style="grid-column:1 / span 3; text-align:right; padding-right:8px;">รวมทั้งหมด</div>' +
    '<div></div>' +
    '<div>' + fmtN(totalWeight, 2) + '</div>' +
    '<div></div>' +
    '<div style="color:oklch(0.38 0.15 275);">' + fmtN(totalSell, 2) + '</div>' +
  '</div>';

  var table = '<div class="list-table" style="background:#fff; border:1px solid oklch(0.9 0.008 60); border-radius:14px; overflow-x:auto; margin-bottom:24px;">' +
    '<div>' + headerRow + dataRows + totalsRow + '</div>' +
  '</div>';

  return '<div style="margin-bottom:20px; font-size:13px; color:oklch(0.5 0.01 60); line-height:1.6;">เลือกขนาดเหล็กปอกในคอลัมน์ "สินค้า" แล้วกรอกจำนวนเป็นปอก และกรอกราคาขาย/กก. เอง ระบบคำนวณน้ำหนักรวม (จำนวนปอก ÷ ' + STIRRUP_BUNDLE_SIZE + ' × น้ำหนัก/มัด) และยอดขายรวม (น้ำหนักรวม × ราคาขาย/กก.) ให้อัตโนมัติ<br>หมายเหตุ: จำนวน ' + STIRRUP_BUNDLE_SIZE + ' ปอก/มัด</div>' +
    table;
};

Dashboard.prototype.renderCalcPage = function () {
  var s = this.state;

  var typeSelector = '<div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;">' +
    CALC_PRODUCT_TYPES.map(function (t) {
      var active = s.calcProductType === t.value;
      return '<button data-action="calc-set-type" data-type="' + t.value + '" style="padding:10px 18px; border-radius:10px; border:1px solid ' + (active ? "oklch(0.38 0.15 275)" : "oklch(0.87 0.008 60)") + '; background:' + (active ? "oklch(0.38 0.15 275)" : "#fff") + '; color:' + (active ? "#fff" : "oklch(0.4 0.01 60)") + '; font-weight:700; font-size:13.5px; cursor:pointer; font-family:inherit;">' + esc(t.label) + '</button>';
    }).join("") +
  '</div>';

  var typeConfig = CALC_PRODUCT_TYPES.filter(function (t) { return t.value === s.calcProductType; })[0];
  var body = s.calcProductType === "slab" ? this.renderSlabCalc() :
    s.calcProductType === "steel" ? this.renderSteelCalc() :
    s.calcProductType === "stirrup" ? this.renderStirrupCalc() :
    '<div style="background:#fff; border:1px solid oklch(0.9 0.008 60); border-radius:14px; padding:48px 20px; text-align:center; color:oklch(0.55 0.01 60); font-size:14px;">ยังไม่มีเครื่องคำนวณสำหรับ "' + esc(typeConfig ? typeConfig.label : s.calcProductType) + '"</div>';

  return '<div class="page-content" style="padding:28px 32px 56px; max-width:1500px; margin:0 auto;">' +
    '<div style="margin-bottom:20px;"><div style="font-family:Kanit; font-weight:700; font-size:22px;">คำนวณราคาสินค้า</div><div style="font-size:13px; color:oklch(0.5 0.01 60); margin-top:2px;">เลือกประเภทสินค้าที่ต้องการคำนวณราคา</div></div>' +
    typeSelector + body +
  '</div>';
};

/* ---------- bootstrap ---------- */

new Dashboard(document.getElementById("app"));
</script>
</body>
</html>
