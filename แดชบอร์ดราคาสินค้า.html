];

];

/* ---------- helpers ---------- */

function fmt(n) { return Number(n).toLocaleString("th-TH"); }

function esc(str) {
  return String(str == null ? "" : str).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

function loadJSON(key, fallback) {
  try {
    var v = JSON.parse(localStorage.getItem(key));
    return v == null ? fallback : v;
  } catch (e) {
    return fallback;
  }
}
function saveJSON(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
}

function resizeImageFile(file, maxDim, quality, callback) {
  var reader = new FileReader();
  reader.onload = function () {
    var image = new Image();
    image.onload = function () {
      var w = image.width, h = image.height;
      var scale = Math.min(1, maxDim / Math.max(w, h));
      var cw = Math.max(1, Math.round(w * scale));
      var ch = Math.max(1, Math.round(h * scale));
      var canvas = document.createElement("canvas");
      canvas.width = cw;
      canvas.height = ch;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(image, 0, 0, cw, ch);
      try {
        callback(canvas.toDataURL("image/jpeg", quality));
      } catch (e) {
        callback(reader.result);
      }
    };
    image.onerror = function () { callback(reader.result); };
    image.src = reader.result;
  };
  reader.readAsDataURL(file);
}

/* ---------- component ---------- */

function Dashboard(root) {
  this.root = root;
  this.state = {
    loggedIn: false,
    authMode: "login",
    authError: "",
    username: "",
    password: "",
    confirmPassword: "",
    users: DEFAULT_USERS,
    page: "price",
    concreteFolders: DEFAULT_CONCRETE_FOLDERS,
    activeConcreteFolderId: null,
    newConcreteFolderName: "",
    tisFolders: DEFAULT_TIS_FOLDERS,
    activeTisFolderId: null,
    newTisFolderName: "",
    search: "",
    category: "all",
    sortBy: "name",
    view: "grid",
    overrides: {},
    editingId: null,
    editName: "",
    editPrice: "",
    editUnit: "",
    editVat: "vat",
    editImage: "",
    customProducts: [],
    showAddForm: false,
    newProdName: "",
    newProdCat: "cement",
    newProdPrice: "",
    newProdUnit: "",
    newProdVat: "vat",
    newProdImage: "",
    newProdError: "",
    newUserName: "",
    newUserPassword: "",
    newUserRole: "viewer",
    userError: "",
    contacts: DEFAULT_CONTACTS,
    newContactName: "",
    newContactDept: "",
    newContactPhone: "",
    newContactAddress: "",
  };

  this.componentDidMount();

  var self = this;
  root.addEventListener("click", function (e) { self.handleClick(e); });
  root.addEventListener("submit", function (e) { self.handleSubmit(e); });
  root.addEventListener("input", function (e) { self.handleFieldChange(e); });
  root.addEventListener("change", function (e) { self.handleChange(e); });

  this.render();
}

Dashboard.prototype.componentDidMount = function () {
  this.state.overrides = loadJSON(STORAGE.overrides, {});
  this.state.customProducts = loadJSON(STORAGE.customProducts, []);
  var cf = loadJSON(STORAGE.concreteFolders, DEFAULT_CONCRETE_FOLDERS);
  this.state.concreteFolders = Array.isArray(cf) ? cf : DEFAULT_CONCRETE_FOLDERS;
  var tf = loadJSON(STORAGE.tisFolders, DEFAULT_TIS_FOLDERS);
  this.state.tisFolders = Array.isArray(tf) ? tf : DEFAULT_TIS_FOLDERS;
  var ct = loadJSON(STORAGE.contacts, DEFAULT_CONTACTS);
  this.state.contacts = Array.isArray(ct) ? ct : DEFAULT_CONTACTS;
  var us = loadJSON(STORAGE.users, DEFAULT_USERS);
  this.state.users = (Array.isArray(us) && us.length) ? us : DEFAULT_USERS;
};

Dashboard.prototype.setState = function (patch) {
  clearTimeout(this._renderTimer);
  Object.assign(this.state, typeof patch === "function" ? patch(this.state) : patch);
  this.render();
};

/* ---- event dispatch ---- */

Dashboard.prototype.handleClick = function (e) {
  var t = e.target.closest("[data-action]");
  if (!t) return;
  var action = t.dataset.action;
  var d = t.dataset;
  switch (action) {
    case "logout": this.onLogout(); break;
    case "nav": this.setState({ page: d.page }); break;
    case "toggle-auth-mode": e.preventDefault(); this.onToggleMode(); break;
    case "set-view": this.setState({ view: d.view }); break;
    case "toggle-add-form": this.onToggleAddForm(); break;
    case "start-edit": this.startEdit(d.id); break;
    case "save-edit": this.saveEdit(d.id); break;
    case "clear-new-prod-image": this.setState({ newProdImage: "" }); break;
    case "clear-edit-image": this.setState({ editImage: "" }); break;
    case "open-folder": this.openFolder(d.kind, d.id); break;
    case "close-folder": this.closeFolder(d.kind); break;
    case "remove-folder": this.removeFolder(d.kind, d.id); break;
    case "remove-file": this.removeFile(d.kind, d.folderId, d.fileId); break;
    case "remove-user": this.removeUser(d.username); break;
    case "remove-contact": this.removeContact(d.id); break;
  }
};

Dashboard.prototype.handleSubmit = function (e) {
  var form = e.target.closest("form[data-form]");
  if (!form) return;
  e.preventDefault();
  var kind = form.dataset.form;
  switch (kind) {
    case "auth": this.onSubmitAuth(); break;
    case "add-product": this.onAddProduct(); break;
    case "add-user": this.onAddUser(); break;
    case "add-contact": this.onAddContact(); break;
    case "add-folder":
      this.addFolder(form.dataset.kind);
      break;
  }
};

Dashboard.prototype.handleFieldChange = function (e) {
  var el = e.target.closest("[data-bind]");
  if (!el || el.type === "file") return;
  var key = el.dataset.bind;
  this.state[key] = el.value;
  if (el.dataset.clear) this.state[el.dataset.clear] = "";
  var self = this;
  clearTimeout(this._renderTimer);
  this._renderTimer = setTimeout(function () { self.render(); }, 150);
};

Dashboard.prototype.handleChange = function (e) {
  if (e.target.type === "file" && e.target.dataset.action === "upload-file") {
    var kind = e.target.dataset.kind;
    var file = e.target.files && e.target.files[0];
    if (file) this.uploadFile(kind, file);
    e.target.value = "";
    return;
  }
  if (e.target.type === "file" && e.target.dataset.action === "upload-new-prod-image") {
    var file2 = e.target.files && e.target.files[0];
    if (file2) this.uploadProductImage(file2, "newProdImage");
    e.target.value = "";
    return;
  }
  if (e.target.type === "file" && e.target.dataset.action === "upload-edit-image") {
    var file3 = e.target.files && e.target.files[0];
    if (file3) this.uploadProductImage(file3, "editImage");
    e.target.value = "";
    return;
  }
  this.handleFieldChange(e);
};

/* ---- auth ---- */

Dashboard.prototype.onToggleMode = function () {
  this.setState(function (s) {
    return { authMode: s.authMode === "login" ? "register" : "login", authError: "", password: "", confirmPassword: "" };
  });
};

Dashboard.prototype.onSubmitAuth = function () {
  var s = this.state;
  var u = s.username.trim();
  if (s.authMode === "login") {
    if (!u || !s.password.trim()) { this.setState({ authError: "กรุณากรอกชื่อผู้ใช้และรหัสผ่าน" }); return; }
    var match = s.users.find(function (usr) { return usr.username === u && usr.password === s.password; });
    if (!match) { this.setState({ authError: "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง" }); return; }
    this.setState({ loggedIn: true, authError: "" });
    return;
  }
  if (!u || !s.password.trim()) { this.setState({ authError: "กรุณากรอกชื่อผู้ใช้และรหัสผ่าน" }); return; }
  if (s.password !== s.confirmPassword) { this.setState({ authError: "รหัสผ่านไม่ตรงกัน" }); return; }
  if (s.users.some(function (usr) { return usr.username === u; })) { this.setState({ authError: "ชื่อผู้ใช้นี้มีอยู่แล้ว" }); return; }
  this.setState(function (s2) {
    var users = s2.users.concat([{ username: u, password: s2.password, role: "viewer" }]);
    saveJSON(STORAGE.users, users);
    return { users: users, loggedIn: true, authError: "" };
  });
};

Dashboard.prototype.onLogout = function () {
  this.setState({ loggedIn: false, password: "", confirmPassword: "", authMode: "login" });
};

/* ---- products ---- */

Dashboard.prototype.getMergedProducts = function () {
  var overrides = this.state.overrides;
  return RAW_PRODUCTS.concat(this.state.customProducts).map(function (p) {
    var ov = overrides[p.id];
    if (!ov) return p;
    return Object.assign({}, p, {
      name: ov.name != null ? ov.name : p.name,
      unit: ov.unit != null ? ov.unit : p.unit,
      price: ov.price != null ? ov.price : p.price,
      vat: ov.vat != null ? ov.vat : p.vat,
      image: ov.image !== undefined ? ov.image : p.image,
    });
  });
};

Dashboard.prototype.computeProducts = function () {
  var s = this.state;
  var q = s.search.trim().toLowerCase();
  var withOverrides = this.getMergedProducts();

  var list = withOverrides.filter(function (p) {
    var matchesCat = s.category === "all" || p.cat === s.category;
    var matchesQ = !q || p.name.toLowerCase().indexOf(q) !== -1 || p.sku.toLowerCase().indexOf(q) !== -1;
    return matchesCat && matchesQ;
  });

  if (s.sortBy === "name") list = list.slice().sort(function (a, b) { return a.name.localeCompare(b.name, "th"); });
  if (s.sortBy === "price_asc") list = list.slice().sort(function (a, b) { return a.price - b.price; });
  if (s.sortBy === "price_desc") list = list.slice().sort(function (a, b) { return b.price - a.price; });

  return list.map(function (p) {
    var im = img(p.cat);
    return {
      id: p.id, name: p.name, sku: p.sku, categoryLabel: CAT_LABEL[p.cat], unit: p.unit,
      priceDisplay: fmt(p.price),
      oldPriceDisplay: p.oldPrice ? fmt(p.oldPrice) : "",
      hasDiscount: !!p.oldPrice,
      vatLabel: p.vat === "novat" ? "NO VAT" : "VAT",
      vatBadgeBg: p.vat === "novat" ? "oklch(0.93 0.03 85)" : "oklch(0.92 0.05 155)",
      vatBadgeColor: p.vat === "novat" ? "oklch(0.45 0.1 80)" : "oklch(0.4 0.09 155)",
      imgBg: im.bg, imgStripe: im.stripe,
      image: p.image || "",
      isEditing: s.editingId === p.id,
    };
  });
};

Dashboard.prototype.startEdit = function (id) {
  var p = this.getMergedProducts().find(function (x) { return x.id === id; });
  if (!p) return;
  this.setState({ editingId: p.id, editName: p.name, editPrice: String(p.price), editUnit: p.unit, editVat: p.vat || "vat", editImage: p.image || "" });
};

Dashboard.prototype.saveEdit = function (id) {
  var s = this.state;
  var price = parseFloat(s.editPrice);
  var name = s.editName.trim();
  var unit = s.editUnit.trim();
  var editVat = s.editVat;
  var editImage = s.editImage;
  this.setState(function (s2) {
    var isCustom = s2.customProducts.some(function (cp) { return cp.id === id; });
    if (isCustom) {
      var customProducts = s2.customProducts.map(function (cp) {
        if (cp.id !== id) return cp;
        return Object.assign({}, cp, {
          name: name || cp.name, unit: unit || cp.unit,
          price: isNaN(price) ? cp.price : price, vat: editVat, image: editImage,
        });
      });
      saveJSON(STORAGE.customProducts, customProducts);
      return { customProducts: customProducts, editingId: null };
    }
    var prev = s2.overrides[id] || {};
    var overrides = Object.assign({}, s2.overrides);
    overrides[id] = {
      name: name || prev.name, unit: unit || prev.unit,
      price: isNaN(price) ? prev.price : price, vat: editVat, image: editImage,
    };
    saveJSON(STORAGE.overrides, overrides);
    return { overrides: overrides, editingId: null };
  });
};

Dashboard.prototype.uploadProductImage = function (file, stateKey) {
  var self = this;
  resizeImageFile(file, 720, 0.85, function (dataUrl) {
    var patch = {};
    patch[stateKey] = dataUrl;
    self.setState(patch);
  });
};

Dashboard.prototype.onToggleAddForm = function () {
  this.setState(function (s) { return { showAddForm: !s.showAddForm, newProdError: "" }; });
};

Dashboard.prototype.onAddProduct = function () {
  var s = this.state;
  var name = s.newProdName.trim();
  var unit = s.newProdUnit.trim();
  var price = parseFloat(s.newProdPrice);
  if (!name || !unit || isNaN(price) || price < 0) {
    this.setState({ newProdError: "กรุณากรอกข้อมูลให้ครบและถูกต้อง" });
    return;
  }
  var id = "custom-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
  var sku = "CUS-" + String(Date.now()).slice(-5);
  var product = { id: id, cat: s.newProdCat, name: name, sku: sku, price: price, oldPrice: null, unit: unit, stock: 0, vat: s.newProdVat, image: s.newProdImage || "" };
  this.setState(function (s2) {
    var customProducts = s2.customProducts.concat([product]);
    saveJSON(STORAGE.customProducts, customProducts);
    return { customProducts: customProducts, showAddForm: false, newProdName: "", newProdPrice: "", newProdUnit: "", newProdVat: "vat", newProdImage: "", newProdError: "" };
  });
};

/* ---- folders (concrete / tis, shared logic) ---- */

Dashboard.prototype._folderKeys = function (kind) {
  return kind === "concrete"
    ? { stateKey: "concreteFolders", activeKey: "activeConcreteFolderId", nameKey: "newConcreteFolderName", storageKey: STORAGE.concreteFolders, idPrefix: "cf" }
    : { stateKey: "tisFolders", activeKey: "activeTisFolderId", nameKey: "newTisFolderName", storageKey: STORAGE.tisFolders, idPrefix: "tis" };
};

Dashboard.prototype.addFolder = function (kind) {
  var k = this._folderKeys(kind);
  var name = (this.state[k.nameKey] || "").trim();
  if (!name) return;
  var id = k.idPrefix + "-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
  var self = this;
  this.setState(function (s) {
    var folders = s[k.stateKey].concat([{ id: id, name: name, files: [] }]);
    saveJSON(k.storageKey, folders);
    var patch = {};
    patch[k.stateKey] = folders;
    patch[k.nameKey] = "";
    return patch;
  });
};

Dashboard.prototype.removeFolder = function (kind, id) {
  var k = this._folderKeys(kind);
  this.setState(function (s) {
    var folders = s[k.stateKey].filter(function (f) { return f.id !== id; });
    saveJSON(k.storageKey, folders);
    var patch = {};
    patch[k.stateKey] = folders;
    if (s[k.activeKey] === id) patch[k.activeKey] = null;
    return patch;
  });
};

Dashboard.prototype.openFolder = function (kind, id) {
  var k = this._folderKeys(kind);
  var patch = {};
  patch[k.activeKey] = id;
  this.setState(patch);
};

Dashboard.prototype.closeFolder = function (kind) {
  var k = this._folderKeys(kind);
  var patch = {};
  patch[k.activeKey] = null;
  this.setState(patch);
};

Dashboard.prototype.uploadFile = function (kind, file) {
  var k = this._folderKeys(kind);
  var activeId = this.state[k.activeKey];
  if (!activeId) return;
  var sizeKb = file.size / 1024;
  var sizeLabel = sizeKb > 1024 ? (sizeKb / 1024).toFixed(1) + " MB" : sizeKb.toFixed(0) + " KB";
  var fileId = Date.now() + "-" + Math.random().toString(36).slice(2, 7);
  var self = this;
  var reader = new FileReader();
  reader.onload = function () {
    var url = reader.result;
    self.setState(function (s) {
      var folders = s[k.stateKey].map(function (f) {
        if (f.id !== activeId) return f;
        return Object.assign({}, f, { files: f.files.concat([{ id: fileId, name: file.name, sizeLabel: sizeLabel, url: url }]) });
      });
      saveJSON(k.storageKey, folders);
      var patch = {};
      patch[k.stateKey] = folders;
      return patch;
    });
  };
  reader.readAsDataURL(file);
};

Dashboard.prototype.removeFile = function (kind, folderId, fileId) {
  var k = this._folderKeys(kind);
  this.setState(function (s) {
    var folders = s[k.stateKey].map(function (f) {
      if (f.id !== folderId) return f;
      return Object.assign({}, f, { files: f.files.filter(function (x) { return x.id !== fileId; }) });
    });
    saveJSON(k.storageKey, folders);
    var patch = {};
    patch[k.stateKey] = folders;
    return patch;
  });
};

/* ---- users ---- */

Dashboard.prototype.onAddUser = function () {
  var s = this.state;
  var u = s.newUserName.trim();
  var p = s.newUserPassword.trim();
  var role = s.newUserRole;
  if (!u || !p) { this.setState({ userError: "กรุณากรอกชื่อผู้ใช้และรหัสผ่าน" }); return; }
  if (s.users.some(function (usr) { return usr.username === u; })) { this.setState({ userError: "ชื่อผู้ใช้นี้มีอยู่แล้ว" }); return; }
  this.setState(function (s2) {
    var users = s2.users.concat([{ username: u, password: p, role: role }]);
    saveJSON(STORAGE.users, users);
    return { users: users, newUserName: "", newUserPassword: "", newUserRole: "viewer", userError: "" };
  });
};

Dashboard.prototype.removeUser = function (username) {
  this.setState(function (s) {
    var users = s.users.filter(function (u) { return u.username !== username; });
    saveJSON(STORAGE.users, users);
    return { users: users };
  });
};

/* ---- contacts ---- */

Dashboard.prototype.onAddContact = function () {
  var s = this.state;
  if (!s.newContactName.trim() || !s.newContactPhone.trim()) return;
  var id = Date.now() + "-" + Math.random().toString(36).slice(2, 7);
  this.setState(function (s2) {
    var contacts = s2.contacts.concat([{
      id: id, name: s2.newContactName.trim(), department: s2.newContactDept.trim(),
      phone: s2.newContactPhone.trim(), address: s2.newContactAddress.trim(),
    }]);
    saveJSON(STORAGE.contacts, contacts);
    return { contacts: contacts, newContactName: "", newContactDept: "", newContactPhone: "", newContactAddress: "" };
  });
};

Dashboard.prototype.removeContact = function (id) {
  this.setState(function (s) {
    var contacts = s.contacts.filter(function (c) { return c.id !== id; });
    saveJSON(STORAGE.contacts, contacts);
    return { contacts: contacts };
  });
};

  var selEnd = active && "selectionEnd" in active ? active.selectionEnd : null;

  this.root.innerHTML = this.state.loggedIn ? this.renderDashboard() : this.renderLogin();

  if (focusId) {

    if (el) {
      el.focus();
      if (selStart != null && "setSelectionRange" in el) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) {}

    }
  }
};

Dashboard.prototype.renderFolderPage = function (kind, title, subtitle) {

  var activeId = s[k.activeKey];
  var active = folders.find(function (f) { return f.id === activeId; });

  if (!active) {

      return '<div class="folder-card" data-action="open-folder" data-kind="' + kind + '" data-id="' + f.id + '" style="position:relative; background:#fff; border:1px solid oklch(0.9 0.008 60); border-radius:14px; padding:20px; cursor:pointer; display:flex; flex-direction:column; gap:8px;">' +

        (isAdmin ? '<button data-action="remove-folder" data-kind="' + kind + '" data-id="' + f.id + '" style="position:absolute; top:12px; right:12px; border:none; background:transparent; color:oklch(0.5 0.15 30); cursor:pointer; font-size:12.5px; font-family:inherit;">ลบ</button>' : '') +
      '</div>';
    }).join("");

    var addFolderForm = isAdmin ?
      '<form data-form="add-folder" data-kind="' + kind + '" style="display:flex; gap:10px; margin-bottom:20px; max-width:420px;">' +
        '<input id="field-new' + (kind === "concrete" ? "Concrete" : "Tis") + 'FolderName" type="text" placeholder="ชื่อโฟลเดอร์ใหม่..." data-bind="' + k.nameKey + '" value="' + esc(s[k.nameKey]) + '" style="flex:1; padding:11px 14px; border-radius:10px; border:1px solid oklch(0.87 0.008 60); font-size:14px; font-family:inherit; outline:none;" />' +
        '<button type="submit" style="padding:11px 18px; border:none; border-radius:10px; background:oklch(0.38 0.15 275); color:#fff; font-weight:700; font-size:13.5px; cursor:pointer; font-family:inherit; white-space:nowrap;">+ เพิ่มโฟลเดอร์</button>' +
      '</form>' : '';

    return '<div style="padding:28px 32px 56px; max-width:1000px; margin:0 auto;">' +
      '<div style="margin-bottom:20px;"><div style="font-family:Kanit; font-weight:700; font-size:22px;">' + esc(title) + '</div><div style="font-size:13px; color:oklch(0.5 0.01 60); margin-top:2px;">' + esc(subtitle) + '</div></div>' +
      addFolderForm +
      '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:16px;">' + foldersHtml + '</div>' +
    '</div>';
  }

  var uploadAction = 'data-action="upload-file" data-kind="' + kind + '"';
  var uploadBox = isAdmin ?
    '<label style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border:2px dashed oklch(0.8 0.02 60); border-radius:14px; padding:36px 20px; background:#fff; cursor:pointer; margin-bottom:24px;">' +
      '<input type="file" accept="application/pdf" ' + uploadAction + ' style="display:none;" />' +
      '<div style="font-size:28px;">📄</div><div style="font-size:14.5px; font-weight:600;">คลิกเพื่ออัปโหลดไฟล์ PDF</div><div style="font-size:12.5px; color:oklch(0.5 0.01 60);">รองรับเฉพาะไฟล์ .pdf</div>' +
    '</label>' : '';

  var filesBody;
  if (active.files.length === 0) {
    filesBody = '<div style="text-align:center; padding:40px 20px; color:oklch(0.55 0.01 60); font-size:14px;">ยังไม่มีไฟล์ในโฟลเดอร์นี้</div>';
  } else {
    filesBody = '<div style="background:#fff; border:1px solid oklch(0.9 0.008 60); border-radius:14px; overflow:hidden;">' + active.files.map(function (f) {
      return '<div style="display:flex; align-items:center; gap:14px; padding:14px 20px; border-top:1px solid oklch(0.93 0.006 70);">' +
        '<div style="width:38px; height:38px; border-radius:8px; background:oklch(0.94 0.03 30); display:flex; align-items:center; justify-content:center; font-size:17px; flex:none;">📕</div>' +
        '<div style="flex:1; min-width:0;"><div style="font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' + esc(f.name) + '</div><div style="font-size:11.5px; color:oklch(0.55 0.01 60);">' + esc(f.sizeLabel) + '</div></div>' +
        '<a href="' + f.url + '" download="' + esc(f.name) + '" style="font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:8px; background:oklch(0.95 0.006 70); text-decoration:none;">เปิดไฟล์</a>' +
        (isAdmin ? '<button data-action="remove-file" data-kind="' + kind + '" data-folder-id="' + active.id + '" data-file-id="' + f.id + '" style="border:none; background:transparent; color:oklch(0.5 0.15 30); cursor:pointer; font-size:13px; font-family:inherit;">ลบ</button>' : '') +
      '</div>';
    }).join("") + '</div>';
  }

  return '<div style="padding:28px 32px 56px; max-width:1000px; margin:0 auto;">' +
    '<div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">' +
      '<button data-action="close-folder" data-kind="' + kind + '" style="border:none; background:oklch(0.95 0.006 70); border-radius:8px; padding:8px 12px; font-size:13px; cursor:pointer; font-family:inherit;">← กลับ</button>' +
      '<div><div style="font-family:Kanit; font-weight:700; font-size:20px;">' + esc(active.name) + '</div><div style="font-size:12.5px; color:oklch(0.5 0.01 60);">ไฟล์ PDF ในโฟลเดอร์นี้</div></div>' +
    '</div>' + uploadBox + filesBody +
  '</div>';
};

          '<input id="field-newContactPhone" type="text" data-bind="newContactPhone" value="' + esc(s.newContactPhone) + '" style="padding:10px 12px; border-radius:9px; border:1px solid oklch(0.87 0.008 60); font-size:14px; font-family:inherit;" />' +
        '</label>' +
        '<label style="display:flex; flex-direction:column; gap:6px; font-size:12.5px; font-weight:600; color:oklch(0.4 0.01 60);">ที่อยู่' +
          '<input id="field-newContactAddress" type="text" data-bind="newContactAddress" value="' + esc(s.newContactAddress) + '" style="padding:10px 12px; border-radius:9px; border:1px solid oklch(0.87 0.008 60); font-size:14px; font-family:inherit;" />' +
        '</label>' +
      '</div>' +
      '<button type="submit" style="padding:11px; border:none; border-radius:9px; background:oklch(0.38 0.15 275); color:#fff; font-weight:700; font-size:13.5px; cursor:pointer; font-family:inherit;">+ เพิ่มรายชื่อติดต่อ</button>' +
    '</form>' : '';

  var body;
  if (s.contacts.length === 0) {
    body = '<div style="text-align:center; padding:40px 20px; color:oklch(0.55 0.01 60); font-size:14px;">ยังไม่มีรายชื่อติดต่อ</div>';
  } else {
    body = '<div style="background:#fff; border:1px solid oklch(0.9 0.008 60); border-radius:14px; overflow:hidden;">' + s.contacts.map(function (c) {
      return '<div style="display:flex; align-items:flex-start; gap:14px; padding:16px 20px; border-top:1px solid oklch(0.93 0.006 70);">' +
        '<div style="flex:1;"><div style="font-weight:700; font-size:14.5px;">' + esc(c.name) + ' <span style="font-weight:500; color:oklch(0.55 0.01 60); font-size:12.5px;">· ' + esc(c.department) + '</span></div>' +
        '<div style="font-size:13px; color:oklch(0.45 0.01 60); margin-top:4px;">📞 ' + esc(c.phone) + '</div>' +
        '<div style="font-size:13px; color:oklch(0.45 0.01 60); margin-top:2px;">📍 ' + esc(c.address) + '</div></div>' +
        (isAdmin ? '<button data-action="remove-contact" data-id="' + c.id + '" style="border:none; background:transparent; color:oklch(0.5 0.15 30); cursor:pointer; font-size:13px; font-family:inherit;">ลบ</button>' : '') +
      '</div>';
    }).join("") + '</div>';
  }

  return '<div style="padding:28px 32px 56px; max-width:700px; margin:0 auto;">' +
    '<div style="font-family:Kanit; font-weight:700; font-size:22px; margin-bottom:6px;">ติดต่อเรา</div>' +
    '<div style="font-size:13px; color:oklch(0.5 0.01 60); margin-bottom:20px;">รายชื่อผู้ติดต่อที่จะแสดงผลที่หน้าร้านของลูกค้า</div>' +
    addForm + body +
  '</div>';
};

/* ---------- bootstrap ---------- */

new Dashboard(document.getElementById("app"));
</script>
</body>
</html>
