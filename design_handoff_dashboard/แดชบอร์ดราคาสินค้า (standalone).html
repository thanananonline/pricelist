document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

color:oklch(0.5 0.01 60);\">{{ p.unit }}<\u002Fdiv>\n            <sc-if value=\"{{ p.isEditing }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"grid-column:1 / -1; display:flex; flex-wrap:wrap; align-items:center; gap:8px; padding-top:8px;\">\n                <input type=\"text\" value=\"{{ p.editName }}\" sc-camel-on-change=\"{{ p.onEditNameChange }}\" placeholder=\"ชื่อสินค้า\" style=\"flex:1 1 220px; padding:6px 9px; border-radius:7px; border:1px solid oklch(0.8 0.02 60); font-size:12.5px; font-family:inherit;\">\n                <input type=\"number\" value=\"{{ p.editPrice }}\" sc-camel-on-change=\"{{ p.onEditPriceChange }}\" placeholder=\"ราคา\" style=\"width:80px; padding:6px 8px; border-radius:7px; border:1px solid oklch(0.8 0.02 60); font-size:12.5px; font-family:inherit;\">\n                <input type=\"text\" value=\"{{ p.editUnit }}\" sc-camel-on-change=\"{{ p.onEditUnitChange }}\" placeholder=\"หน่วย\" style=\"width:70px; padding:6px 8px; border-radius:7px; border:1px solid oklch(0.8 0.02 60); font-size:12.5px; font-family:inherit;\">\n                <input type=\"number\" value=\"{{ p.editStock }}\" sc-camel-on-change=\"{{ p.onEditStockChange }}\" placeholder=\"สต็อก\" style=\"width:65px; padding:6px 8px; border-radius:7px; border:1px solid oklch(0.8 0.02 60); font-size:12.5px; font-family:inherit;\">\n                <button sc-camel-on-click=\"{{ p.onSaveEdit }}\" style=\"border:none; background:oklch(0.38 0.15 275); color:#fff; border-radius:7px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit;\">บันทึก<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ p.isNotEditing }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex; align-items:center; gap:10px;\">\n                <span style=\"font-size:11.5px; padding:3px 8px; border-radius:6px; background:{{ p.stockBadgeBg }}; color:{{ p.stockBadgeColor }}; font-weight:600;\">{{ p.stockLabel }}<\u002Fspan>\n                <button sc-camel-on-click=\"{{ p.onStartEdit }}\" style=\"border:none; background:oklch(0.95 0.006 70); border-radius:7px; padding:5px 9px; font-size:11.5px; cursor:pointer; font-family:inherit;\">✏️ แก้ไข<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center; padding:60px 20px; color:oklch(0.55 0.01 60);\">\n        <div style=\"font-size:32px; margin-bottom:8px;\">🔎<\u002Fdiv>\n        <div style=\"font-size:15px;\">ไม่พบสินค้าที่ตรงกับเงื่อนไข ลองปรับคำค้นหาหรือหมวดหมู่<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isConcretePage }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:28px 32px 56px; max-width:1000px; margin:0 auto;\">\n    <div style=\"margin-bottom:20px;\">\n      <div style=\"font-family:Kanit; font-weight:700; font-size:22px;\">แบบผลิตภัณฑ์คอนกรีต<\u002Fdiv>\n      <div style=\"font-size:13px; color:oklch(0.5 0.01 60); margin-top:2px;\">อัปโหลดไฟล์ PDF แบบผลิตภัณฑ์ เช่น แบบท่อ บ่อพัก แผ่นพื้น เสาเข็ม<\u002Fdiv>\n    <\u002Fdiv>\n\n    <label style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border:2px dashed oklch(0.8 0.02 60); border-radius:14px; padding:36px 20px; background:#fff; cursor:pointer; margin-bottom:24px;\">\n      <input type=\"file\" accept=\"application/pdf\" sc-camel-on-change=\"{{ onUploadPdf }}\" style=\"display:none;\">\n      <div style=\"font-size:28px;\">📄<\u002Fdiv>\n      <div style=\"font-size:14.5px; font-weight:600;\">คลิกเพื่ออัปโหลดไฟล์ PDF<\u002Fdiv>\n      <div style=\"font-size:12.5px; color:oklch(0.5 0.01 60);\">รองรับเฉพาะไฟล์ .pdf<\u002Fdiv>\n    <\u002Flabel>\n\n    <sc-if value=\"{{ hasConcreteFiles }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#fff; border:1px solid oklch(0.9 0.008 60); border-radius:14px; overflow:hidden;\">\n        <sc-for list=\"{{ concreteFiles }}\" as=\"f\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex; align-items:center; gap:14px; padding:14px 20px; border-top:1px solid oklch(0.93 0.006 70);\">\n            <div style=\"width:38px; height:38px; border-radius:8px; background:oklch(0.94 0.03 30); display:flex; align-items:center; justify-content:center; font-size:17px; flex:none;\">📕<\u002Fdiv>\n            <div style=\"flex:1; min-width:0;\">\n              <div style=\"font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ f.name }}<\u002Fdiv>\n              <div style=\"font-size:11.5px; color:oklch(0.55 0.01 60);\">{{ f.sizeLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n            <a href=\"{{ f.url }}\" download=\"{{ f.name }}\" style=\"font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:8px; background:oklch(0.95 0.006 70); text-decoration:none;\">เปิดไฟล์<\u002Fa>\n            <button sc-camel-on-click=\"{{ f.onRemove }}\" style=\"border:none; background:transparent; color:oklch(0.5 0.15 30); cursor:pointer; font-size:13px; font-family:inherit;\">ลบ<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isConcreteEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"text-align:center; padding:40px 20px; color:oklch(0.55 0.01 60); font-size:14px;\">ยังไม่มีไฟล์แบบผลิตภัณฑ์ที่อัปโหลด<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isUsersPage }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:28px 32px 56px; max-width:700px; margin:0 auto;\">\n    <div style=\"font-family:Kanit; font-weight:700; font-size:22px; margin-bottom:20px;\">จัดการผู้ใช้<\u002Fdiv>\n\n    <form sc-camel-on-submit=\"{{ onAddUser }}\" style=\"b lay:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:oklch(0.38 0.15 275); flex:none;\">{{ u.initial }}<\u002Fdiv>\n          <div style=\"font-weight:600; font-size:14px; flex:1;\">{{ u.username }}<\u002Fdiv>\n          <button sc-camel-on-click=\"{{ u.onRemove }}\" style=\"border:none; background:transparent; color:oklch(0.5 0.15 30); cursor:pointer; font-size:13px; font-family:inherit;\">ลบ<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isContactPage }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:28px 32px 56px; max-width:700px; margin:0 auto;\">\n    <div style=\"font-family:Kanit; font-weight:700; font-size:22px; margin-bottom:6px;\">ติดต่อเรา<\u002Fdiv>\n    <div style=\"font-size:13px; color:oklch(0.5 0.01 60); margin-bottom:20px;\">รายชื่อผู้ติดต่อที่จะแสดงผลที่หน้าร้านของลูกค้า<\u002Fdiv>\n\n    <form sc-camel-on-submit=\"{{ onAddContact }}\" style=\"background:#fff; border:1px solid oklch(0.9 0.008 60); border-radius:14px; padding:20px 22px; display:flex; flex-direction:column; gap:14px; margin-bottom:20px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n        <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12.5px; font-weight:600; color:oklch(0.4 0.01 60);\">\n          ชื่อ\n          <input type=\"text\" value=\"{{ newContactName }}\" sc-camel-on-change=\"{{ onNewContactNameChange }}\" style=\"padding:10px 12px; border-radius:9px; border:1px solid oklch(0.87 0.008 60); font-size:14px; font-family:inherit;\">\n        <\u002Flabel>\n        <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12.5px; font-weight:600; color:oklch(0.4 0.01 60);\">\n          แผนก\n          <input type=\"text\" value=\"{{ newContactDept }}\" sc-camel-on-change=\"{{ onNewContactDeptChange }}\" style=\"padding:10px 12px; border-radius:9px; border:1px solid oklch(0.87 0.008 60); font-size:14px; font-family:inherit;\">\n        <\u002Flabel>\n        <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12.5px; font-weight:600; color:oklch(0.4 0.01 60);\">\n          เบอร์โทร\n          <input type=\"text\" value=\"{{ newContactPhone }}\" sc-camel-on-change=\"{{ onNewContactPhoneChange }}\" style=\"padding:10px 12px; border-radius:9px; border:1px solid oklch(0.87 0.008 60); font-size:14px; font-family:inherit;\">\n        <\u002Flabel>\n        <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12.5px; font-weight:600; color:oklch(0.4 0.01 60);\">\n          ที่อยู่\n          <input type=\"text\" value=\"{{ newContactAddress }}\" sc-camel-on-change=\"{{ onNewContactAddressChange }}\" style=\"padding:10px 12px; border-radius:9px; border:1px solid oklch(0.87 0.008 60); font-size:14px; font-family:inherit;\">\n        <\u002Flabel>\n      <\u002Fdiv>\n      <button type=\"submit\" style=\"padding:11px; border:none; border-radius:9px; background:oklch(0.38 0.15 275); color:#fff; font-weight:700; font-size:13.5px; cursor:pointer; font-family:inherit;\">+ เพิ่มรายชื่อติดต่อ<\u002Fbutton>\n    <\u002Fform>\n\n    <sc-if value=\"{{ hasContacts }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#fff; border:1px solid oklch(0.9 0.008 60); border-radius:14px; overflow:hidden;\">\n        <sc-for list=\"{{ contactRows }}\" as=\"c\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex; align-items:flex-start; gap:14px; padding:16px 20px; border-top:1px solid oklch(0.93 0.006 70);\">\n            <div style=\"flex:1;\">\n              <div style=\"font-weight:700; font-size:14.5px;\">{{ c.name }} <span style=\"font-weight:500; color:oklch(0.55 0.01 60); font-size:12.5px;\">· {{ c.department }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:13px; color:oklch(0.45 0.01 60); margin-top:4px;\">📞 {{ c.phone }}<\u002Fdiv>\n              <div style=\"font-size:13px; color:oklch(0.45 0.01 60); margin-top:2px;\">📍 {{ c.address }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button sc-camel-on-click=\"{{ c.onRemove }}\" style=\"border:none; background:transparent; color:oklch(0.5 0.15 30); cursor:pointer; font-size:13px; font-family:inherit;\">ลบ<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isContactsEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"text-align:center; padding:40px 20px; color:oklch(0.55 0.01 60); font-size:14px;\">ยังไม่มีรายชื่อติดต่อ<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst CATEGORIES = [\n  { value: \"all\", label: \"ทุกหมวดหมู่\" },\n  { value: \"cement\", label: \"ปูนซีเมนต์\" },\n  { value: \"block\", label: \"อิฐมวลเบา\" },\n  { value: \"roof\", label: \"กระเบื้องหลังคา\" },\n  { value: \"steel\", label: \"เหล็ก\" },\n  { value: \"tile\", label: \"กระเบื้องปูพื้น/ผนัง\" },\n  { value: \"sanitary\", label: \"สุขภัณฑ์\" },\n  { value: \"door\", label: \"ประตู-ไม้\" },\n  { value: \"paint\", label: \"สี\" },\n  { value: \"concrete\", label: \"คอนกรีตสำเร็จรูป\" },\n  { value: \"pipe\", label: \"ท่อและบ่อพัก\" },\n];\n\nconst CAT_LABEL = Object.fromEntries(CATEGORIES.map(c => [c.value, c.label]));\n\n// oklch hue variation per category, same L/C, for image placeholder tint\nconst CAT_HUE = {\n  cement: 60, block: 200, roof: 20, steel: 250, tile: 160,\n  sanitary: 230, door: 40, paint: 300, concrete: 90, pipe: 210,\n};\n\nfunction img(cat) {\n  const h = CAT_HUE[cat] ?? 60;\n  return {\n    bg: `oklch(0.93 0.02 ${h})`,\n    stripe: `oklch(0.88 0.035 ${h})`,\n  };\n}\n\nconst RAW_PRODUCTS = [\n  // ปูนซีเมนต์\n  { id: \"c1\", cat: \"cement\", name: \"ปูนซีเมนต์ปอร์ตแลนด์ ตราอินทรี ถุง 50 กก.\", sku: \"CEM-001\", price: 145, oldPrice: null, unit: \"ถุง\", stock: 320 },\n  { id: \"c2\", cat: \"cement\", name: \"ปูนซีเมนต์ผสม ตราเสือ ถุง 50 กก.\", sku: \"CEM-002\", price: 128, oldPrice: 138, unit: \"ถุง\", stock: 210 },\n  { id: \"c3\", cat: \"cement\", name: \"ปูนก่อสำเร็จรูป ตราจระเข้ ถุง 50 กก.\", sku: \"CEM-003\", price: 132, oldPrice: null, unit: \"ถุง\", stock: 8 },\n  // อิฐมวลเบา\n  { id: \"b1\", cat: \"block\", name: \"อิฐมวลเบา Q-CON หนา 7.5 ซม.\", sku: \"BLK-001\", price: 22, oldPrice: null, unit: \"แผ่น\", stock: 1400 },\n  { id: \"b2\", cat: \"block\", name: \"อิฐมวลเบา ตราเพชร หนา 10 ซม.\", sku: \"BLK-002\", price: 28, oldPrice: 32, unit: \"แผ่น\", stock: 620 },\n  { id: \"b3\", cat: \"block\", name: \"อิฐมวลเบา Superblock หนา 12.5 ซม.\", sku: \"BLK-003\", price: 34, oldPrice: null, unit: \"แผ่น\", stock: 45 },\n  // กระเบื้องหลังคา\n  { id: \"r1\", cat: \"roof\", name: \"กระเบื้องหลังคาคอนกรีต ตราเพชร รุ่นลอนคู่\", sku: \"ROF-001\", price: 42, oldPrice: null, unit: \"แผ่น\", stock: 980 },\n  { id: \"r2\", cat: \"roof\", name: \"กระเบื้องหลังคาไฟเบอร์ซีเมนต์ SCG\", sku: \"ROF-002\", price: 55, oldPrice: 62, unit: \"แผ่น\", stock: 340 },\n  { id: \"r3\", cat: \"roof\", name: \"แผ่นหลังคาเมทัลชีท เคลือบสี\", sku: \"ROF-003\", price: 189, oldPrice: null, unit: \"แผ่น\", stock: 6 },\n  // เหล็ก\n  { id: \"s1\", cat: \"steel\", name: \"เหล็กเส้นกลม RB9 มม. ยาว 10 ม.\", sku: \"STL-001\", price: 98, oldPrice: null, unit: \"เส้น\", stock: 560 },\n  { id: \"s2\", cat: \"steel\", name: \"เหล็กข้ออ้อย DB12 มม. ยาว 10 ม.\", sku: \"STL-002\", price: 175, oldPrice: 190, unit: \"เส้น\", stock: 240 },\n  { id: \"s3\", cat: \"steel\", name: \"เหล็กกล่องสี่เหลี่ยม 2x2 นิ้ว หนา 1.2 มม.\", sku: \"STL-003\", price: 265, oldPrice: null, unit: \"เส้น\", stock: 12 },\n  // กระเบื้องปูพื้น/ผนัง\n  { id: \"t1\", cat: \"tile\", name: \"กระเบื้องปูพื้น 60x60 ซม. ผิวด้าน\", sku: \"TIL-001\", price: 289, oldPrice: null, unit: \"ตร.ม.\", stock: 480 },\n  { id: \"t2\", cat: \"tile\", name: \"กระเบื้องปูผนังห้องน้ำ 30x60 ซม.\", sku: \"TIL-002\", price: 219, oldPrice: 249, unit: \"ตร.ม.\", stock: 310 },\n  { id: \"t3\", cat: \"tile\", name: \"กระเบื้องยางลายไม้ SPC หนา 4 มม.\", sku: \"TIL-003\", price: 399, oldPrice: null, unit: \"ตร.ม.\", stock: 55 },\n  // สุขภัณฑ์\n  { id: \"n1\", cat: \"sanitary\", name: \"โถสุขภัณฑ์ชักโครกแบบราวห้อย COTTO\", sku: \"SAN-001\", price: 3450, oldPrice: null, unit: \"ชุด\", stock: 24 },\n  { id: \"n2\", cat: \"sanitary\", name: \"อ่างล้างหน้าแขวนผนัง American Standard\", sku: \"SAN-002\", price: 1290, oldPrice: 1450, unit: \"ชุด\", stock: 38 },\n  { id: \"n3\", cat: \"sanitary\", name: \"ก๊อกน้ำอ่างล้างหน้า สแตนเลส\", sku: \"SAN-003\", price: 590, oldPrice: null, unit: \"ชิ้น\", stock: 4 },\n  // ประตู-ไม้\n  { id: \"d1\", cat: \"door\", name: \"ประตู UPVC บานเรียบ สีขาว 80x200 ซม.\", sku: \"DOR-001\", price: 1850, oldPrice: null, unit: \"บาน\", stock: 42 },\n  { id: \"d2\", cat: \"door\", name: \"ประตูไม้เอ็นจิเนียร์ บานทึบ 90x200 ซม.\", sku: \"DOR-002\", price: 2650, oldPrice: 2950, unit: \"บาน\", stock: 18 },\n  { id: \"d3\", cat: \"door\", name: \"วงกบประตู PVC สีน้ำตาล\", sku: \"DOR-003\", price: 780, oldPrice: null, unit: \"ชุด\", stock: 60 },\n  // สี\n  { id: \"p1\", cat: \"paint\", name: \"สีน้ำอะครีลิกภายนอก TOA SuperShield\", sku: \"PNT-001\", price: 1690, oldPrice: null, unit: \"แกลลอน\", stock: 96 },\n  { id: \"p2\", cat: \"paint\", name: \"สีน้ำพลาสติกภายใน Dulux\", sku: \"PNT-002\", price: 990, oldPrice: 1090, unit: \"แกลลอน\", stock: 150 },\n  { id: \"p3\", cat: \"paint\", name: \"สีรองพื้นปูนใหม่ กันด่าง\", sku: \"PNT-003\", price: 650, oldPrice: null, unit: \"แกลลอน\", stock: 9 },\n  // คอนกรีตสำเร็จรูป\n  { id: \"k1\", cat: \"concrete\", name: \"แผ่นพื้นคอนกรีตสำเร็จรูป ท้องเรียบ\", sku: \"CON-001\", price: 245, oldPrice: null, unit: \"แผ่น\", stock: 220 },\n  { id: \"k2\", cat: \"concrete\", name: \"ท่อคอนกรีตเสริมเหล็ก เส้นผ่านศูนย์กลาง 40 ซม.\", sku: \"CON-002\", price: 620, oldPrice: 680, unit: \"ท่อ\", stock: 75 },\n  { id: \"k3\", cat: \"concrete\", name: \"เสาเข็มคอนกรีตอัดแรง หน้าตัด I26\", sku: \"CON-003\", price: 890, oldPrice: null, unit: \"ต้น\", stock: 5 },\n  // ท่อและบ่อพัก\n  { id: \"pp1\", cat: \"pipe\", name: \"ท่อ PVC สีฟ้า ชั้น 8.5 ขนาด 4 นิ้ว ยาว 4 ม.\", sku: \"PIP-001\", price: 285, oldPrice: null, unit: \"ท่อน\", stock: 640 },\n  { id: \"pp2\", cat: \"pipe\", name: \"ท่อ HDPE สำหรับประปา ขนาด 2 นิ้ว\", sku: \"PIP-002\", price: 195, oldPrice: 215, unit: \"เมตร\", stock: 410 },\n  { id: \"pp3\", cat: \"pipe\", name: \"ท่อระบายน้ำคอนกรีตเสริมเหล็ก ขนาด 60 ซม.\", sku: \"PIP-003\", price: 890, oldPrice: null, unit: \"ท่อน\", stock: 32 },\n  { id: \"pp4\", cat: \"pipe\", name: \"บ่อพัก คสล. สำเร็จรูป ขนาด 40x40 ซม.\", sku: \"PIP-004\", price: 450, oldPrice: 490, unit: \"บ่อ\", stock: 58 },\n  { id: \"pp5\", cat: \"pipe\", name: \"บ่อพักพลาสติก PP ฝาเหล็กหล่อ ขนาด 30 ซม.\", sku: \"PIP-005\", price: 620, oldPrice: null, unit: \"ชุด\", stock: 7 },\n  { id: \"pp6\", cat: \"pipe\", name: \"ฝาบ่อพักคอนกรีต พร้อมขอบเหล็ก ขนาด 40 ซม.\", sku: \"PIP-006\", price: 320, oldPrice: null, unit: \"ฝา\", stock: 90 },\n];\n\nfunction fmt(n) {\n  return n.toLocaleString(\"th-TH\");\n}\n\nfunction stockInfo(stock) {\n  if (stock <= 10) return { label: `เหลือน้อย · ${stock}`, bg: \"oklch(0.9 0.05 30)\", color: \"oklch(0.42 0.14 30)\" };\n  if (stock <= 50) return { label: `สต็อก · ${stock}`, bg: \"oklch(0.92 0.04 85)\", color: \"oklch(0.42 0.09 80)\" };\n  return { label: `สต็อก · ${stock}`, bg: \"oklch(0.92 0.04 155)\", color: \"oklch(0.4 0.09 155)\" };\n}\n\nconst OVERRIDES_KEY = \"thananan_price_overrides\";\nconst CUSTOM_PRODUCTS_KEY = \"thananan_custom_products\";\nconst CONCRETE_FILES_KEY = \"thananan_concrete_files\";\n\nfunction loadCustomProducts() {\n  try {\n    return JSON.parse(localStorage.getItem(CUSTOM_PRODUCTS_KEY) || \"[]\");\n  } catch (e) {\n    return [];\n  }\n}\nconst CONTACT_INFO_KEY = \"thananan_contact_info\";\n\nconst DEFAULT_CONTACTS = [\n  { id: \"seed1\", name: \"คุณสมชาย ใจดี\", department: \"ฝ่ายขาย\", phone: \"081-234-5678\", address: \"99/1 ถนนสุขาภิบาล ตำบลบางพลี อำเภอบางพลี จังหวัดสมุทรปราการ 10540\" },\n];\n\nfunction loadConcreteFiles() {\n  try {\n    return JSON.parse(localStorage.getItem(CONCRETE_FILES_KEY) || \"[]\");\n  } catch (e) {\n    return [];\n  }\n}\n\nfunction loadContacts() {\n  try {\n    const stored = JSON.parse(localStorage.getItem(CONTACT_INFO_KEY) || \"null\");\n    return Array.isArray(stored) ? stored : DEFAULT_CONTACTS;\n  } catch (e) {\n    return DEFAULT_CONTACTS;\n  }\n}\n\nclass Component extends DCLogic {\n  state = {\n    loggedIn: false,\n    authMode: \"login\", // \"login\" | \"register\"\n    authError: \"\",\n    username: \"\",\n    password: \"\",\n    confirmPassword: \"\",\n    users: [{ username: \"admin\", password: \"1234\" }],\n    page: \"price\", // \"price\" | \"concrete\" | \"users\"\n    concreteFiles: [],\n    search: \"\",\n    category: \"all\",\n    sortBy: \"name\",\n    view: \"grid\",\n    overrides: {}, // id -> { name, price, unit, stock }\n    editingId: null,\n    editName: \"\",\n    editPrice: \"\",\n    editUnit: \"\",\n    editStock: \"\",\n    customProducts: [],\n    showAddForm: false,\n    newProdName: \"\",\n    newProdCat: \"cement\",\n    newProdPrice: \"\",\n    newProdUnit: \"\",\n    newProdStock: \"\",\n    newProdError: \"\",\n    newUserName: \"\",\n    newUserPassword: \"\",\n    userError: \"\",\n    contacts: DEFAULT_CONTACTS,\n    newContactName: \"\",\n    newContactDept: \"\",\n    newContactPhone: \"\",\n    newContactAddress: \"\",\n  };\n\n  componentDidMount() {\n    try {\n      const stored = JSON.parse(localStorage.getItem(OVERRIDES_KEY) || \"{}\");\n      this.setState({ overrides: stored });\n    } catch (e) {}\n    this.setState({ concreteFiles: loadConcreteFiles(), contacts: loadContacts(), customProducts: loadCustomProducts() });\n  }\n\n  goToPricePage = () => this.setState({ page: \"price\" });\n  goToConcretePage = () => this.setState({ page: \"concrete\" });\n  goToUsersPage = () => this.setState({ page: \"users\" });\n  goToContactPage = () => this.setState({ page: \"contact\" });\n\n  onNewContactNameChange = (e) => this.setState({ newContactName: e.target.value });\n  onNewContactDeptChange = (e) => this.setState({ newContactDept: e.target.value });\n  onNewContactPhoneChange = (e) => this.setState({ newContactPhone: e.target.value });\n  onNewContactAddressChange = (e) => this.setState({ newContactAddress: e.target.value });\n\n  onAddContact = (e) => {\n    e.preventDefault();\n    const { newContactName, newContactDept, newContactPhone, newContactAddress } = this.state;\n    if (!newContactName.trim() || !newContactPhone.trim()) return;\n    const id = `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;\n    this.setState((s) => {\n      const contacts = [...s.contacts, { id, name: newContactName.trim(), department: newContactDept.trim(), phone: newContactPhone.trim(), address: newContactAddress.trim() }];\n      try { localStorage.setItem(CONTACT_INFO_KEY, JSON.stringify(contacts)); } catch (err) {}\n      return { contacts, newContactName: \"\", newContactDept: \"\", newContactPhone: \"\", newContactAddress: \"\" };\n    });\n  };\n\n  removeContact = (id) => {\n    this.setState((s) => {\n      const contacts = s.contacts.filter((c) => c.id !== id);\n      try { localStorage.setItem(CONTACT_INFO_KEY, JSON.stringify(contacts)); } catch (err) {}\n      return { contacts };\n    });\n  };\n\n  startEdit = (p) => this.setState({ editingId: p.id, editName: p.name, editPrice: String(p.price), editUnit: p.unit, editStock: String(p.stock) });\n  onEditNameChange = (e) => this.setState({ editName: e.target.value });\n  onEditPriceChange = (e) => this.setState({ editPrice: e.target.value });\n  onEditUnitChange = (e) => this.setState({ editUnit: e.target.value });\n  onEditStockChange = (e) => this.setState({ editStock: e.target.value });\n  saveEdit = (id) => {\n    const { editName, editPrice, editUnit, editStock } = this.state;\n    const price = parseFloat(editPrice);\n    const stock = parseInt(editStock, 10);\n    const name = editName.trim();\n    const unit = editUnit.trim();\n    this.setState((s) => {\n      const isCustom = s.customProducts.some((cp) => cp.id === id);\n      if (isCustom) {\n        const customProducts = s.customProducts.map((cp) =>\n          cp.id === id\n            ? { ...cp, name: name || cp.name, unit: unit || cp.unit, price: isNaN(price) ? cp.price : price, stock: isNaN(stock) ? cp.stock : stock }\n            : cp\n        );\n        try { localStorage.setItem(CUSTOM_PRODUCTS_KEY, JSON.stringify(customProducts)); } catch (e) {}\n        return { customProducts, editingId: null };\n      }\n      const prev = s.overrides[id] || {};\n      const overrides = {\n        ...s.overrides,\n        [id]: {\n          name: name || prev.name,\n          unit: unit || prev.unit,\n          price: isNaN(price) ? prev.price : price,\n          stock: isNaN(stock) ? prev.stock : stock,\n        },\n      };\n      try { localStorage.setItem(OVERRIDES_KEY, JSON.stringify(overrides)); } catch (e) {}\n      return { overrides, editingId: null };\n    });\n  };\n\n  onToggleAddForm = () => this.setState((s) => ({ showAddForm: !s.showAddForm, newProdError: \"\" }));\n  onNewProdNameChange = (e) => this.setState({ newProdName: e.target.value, newProdError: \"\" });\n  onNewProdCatChange = (e) => this.setState({ newProdCat: e.target.value });\n  onNewProdPriceChange = (e) => this.setState({ newProdPrice: e.target.value, newProdError: \"\" });\n  onNewProdUnitChange = (e) => this.setState({ newProdUnit: e.target.value, newProdError: \"\" });\n  onNewProdStockChange = (e) => this.setState({ newProdStock: e.target.value, newProdError: \"\" });\n\n  onAddProduct = (e) => {\n    e.preventDefault();\n    const { newProdName, newProdCat, newProdPrice, newProdUnit, newProdStock } = this.state;\n    const name = newProdName.trim();\n    const unit = newProdUnit.trim();\n    const price = parseFloat(newProdPrice);\n    const stock = parseInt(newProdStock, 10);\n    if (!name || !unit || isNaN(price) || price < 0 || isNaN(stock) || stock < 0) {\n      this.setState({ newProdError: \"กรุณากรอกข้อมูลให้ครบและถูกต้อง\" });\n      return;\n    }\n    const id = `custom-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;\n    const sku = `CUS-${String(Date.now()).slice(-5)}`;\n    const product = { id, cat: newProdCat, name, sku, price, oldPrice: null, unit, stock };\n    this.setState((s) => {\n      const customProducts = [...s.customProducts, product];\n      try { localStorage.setItem(CUSTOM_PRODUCTS_KEY, JSON.stringify(customProducts)); } catch (err) {}\n      return {\n        customProducts,\n        showAddForm: false,\n        newProdName: \"\",\n        newProdPrice: \"\",\n        newProdUnit: \"\",\n        newProdStock: \"\",\n        newProdError: \"\",\n      };\n    });\n  };\n\n  onNewUserNameChange = (e) => this.setState({ newUserName: e.target.value, userError: \"\" });\n  onNewUserPasswordChange = (e) => this.setState({ newUserPassword: e.target.value, userError: \"\" });\n  onAddUser = (e) => {\n    e.preventDefault();\n    const u = this.state.newUserName.trim();\n    const p = this.state.newUserPassword.trim();\n    if (!u || !p) {\n      this.setState({ userError: \"กรุณากรอกชื่อผู้ใช้และรหัสผ่าน\" });\n      return;\n    }\n    if (this.state.users.some((usr) => usr.username === u)) {\n      this.setState({ userError: \"ชื่อผู้ใช้นี้มีอยู่แล้ว\" });\n      return;\n    }\n    this.setState((s) => ({\n      users: [...s.users, { username: u, password: p }],\n      newUserName: \"\",\n      newUserPassword: \"\",\n      userError: \"\",\n    }));\n  };\n  removeUser = (username) => {\n    this.setState((s) => ({ users: s.users.filter((u) => u.username !== username) }));\n  };\n\n  onUploadPdf = (e) => {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    const sizeKb = file.size / 1024;\n    const sizeLabel = sizeKb > 1024 ? `${(sizeKb / 1024).toFixed(1)} MB` : `${sizeKb.toFixed(0)} KB`;\n    const id = `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;\n    const reader = new FileReader();\n    reader.onload = () => {\n      const dataUrl = reader.result;\n      this.setState((s) => {\n        const concreteFiles = [...s.concreteFiles, { id, name: file.name, sizeLabel, url: dataUrl }];\n        try { localStorage.setItem(CONCRETE_FILES_KEY, JSON.stringify(concreteFiles)); } catch (err) {}\n        return { concreteFiles };\n      });\n    };\n    reader.readAsDataURL(file);\n    e.target.value = \"\";\n  };\n\n  removeConcreteFile = (id) => {\n    this.setState((s) => {\n      const concreteFiles = s.concreteFiles.filter((f) => f.id !== id);\n      try { localStorage.setItem(CONCRETE_FILES_KEY, JSON.stringify(concreteFiles)); } catch (err) {}\n      return { concreteFiles };\n    });\n  };\n\n  onUsernameChange = (e) => this.setState({ username: e.target.value, authError: \"\" });\n  onPasswordChange = (e) => this.setState({ password: e.target.value, authError: \"\" });\n  onConfirmPasswordChange = (e) => this.setState({ confirmPassword: e.target.value, authError: \"\" });\n\n  onToggleMode = (e) => {\n    e.preventDefault();\n    this.setState((s) => ({\n      authMode: s.authMode === \"login\" ? \"register\" : \"login\",\n      authError: \"\",\n      password: \"\",\n      confirmPassword: \"\",\n    }));\n  };\n\n  onSubmitAuth = (e) => {\n    e.preventDefault();\n    const { authMode, username, password, confirmPassword, users } = this.state;\n    const u = username.trim();\n\n    if (authMode === \"login\") {\n      if (!u || !password.trim()) {\n        this.setState({ authError: \"กรุณากรอกชื่อผู้ใช้และรหัสผ่าน\" });\n        return;\n      }\n      const match = users.find((usr) => usr.username === u && usr.password === password);\n      if (!match) {\n        this.setState({ authError: \"ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง\" });\n        return;\n      }\n      this.setState({ loggedIn: true, authError: \"\" });\n      return;\n    }\n\n    // register\n    if (!u || !password.trim()) {\n      this.setState({ authError: \"กรุณากรอกชื่อผู้ใช้และรหัสผ่าน\" });\n      return;\n    }\n    if (password !== confirmPassword) {\n      this.setState({ authError: \"รหัสผ่านไม่ตรงกัน\" });\n      return;\n    }\n    if (users.some((usr) => usr.username === u)) {\n      this.setState({ authError: \"ชื่อผู้ใช้นี้มีอยู่แล้ว\" });\n      return;\n    }\n    this.setState((s) => ({\n      users: [...s.users, { username: u, password }],\n      loggedIn: true,\n      authError: \"\",\n    }));\n  };\n\n  onLogout = () => this.setState({ loggedIn: false, password: \"\", confirmPassword: \"\", authMode: \"login\" });\n\n  onSearchChange = (e) => this.setState({ search: e.target.value });\n  onCategoryChange = (e) => this.setState({ category: e.target.value });\n  onSortChange = (e) => this.setState({ sortBy: e.target.value });\n  setViewGrid = () => this.setState({ view: \"grid\" });\n  setViewList = () => this.setState({ view: \"list\" });\n\n  renderVals() {\n    const { search, category, sortBy, view, loggedIn, authMode, authError, username, password, confirmPassword, page, concreteFiles, overrides, editingId, editName, editPrice, editUnit, editStock, users, newUserName, newUserPassword, userError, contacts, newContactName, newContactDept, newContactPhone, newContactAddress, customProducts, showAddForm, newProdName, newProdCat, newProdPrice, newProdUnit, newProdStock, newProdError } = this.state;\n    const isPricePage = page === \"price\";\n    const isConcretePage = page === \"concrete\";\n    const isUsersPage = page === \"users\";\n    const isContactPage = page === \"contact\";\n    const q = search.trim().toLowerCase();\n\n    const withOverrides = [...RAW_PRODUCTS, ...customProducts].map((p) => {\n      const ov = overrides[p.id];\n      return ov ? { ...p, name: ov.name ?? p.name, unit: ov.unit ?? p.unit, price: ov.price ?? p.price, stock: ov.stock ?? p.stock } : p;\n    });\n\n    let list = withOverrides.filter((p) => {\n      const matchesCat = category === \"all\" || p.cat === category;\n      const matchesQ = !q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q);\n      return matchesCat && matchesQ;\n    });\n\n    if (sortBy === \"name\") list = [...list].sort((a, b) => a.name.localeCompare(b.name, \"th\"));\n    if (sortBy === \"price_asc\") list = [...list].sort((a, b) => a.price - b.price);\n    if (sortBy === \"price_desc\") list = [...list].sort((a, b) => b.price - a.price);\n    if (sortBy === \"stock_asc\") list = [...list].sort((a, b) => a.stock - b.stock);\n\n    const products = list.map((p) => {\n      const im = img(p.cat);\n      const si = stockInfo(p.stock);\n      return {\n        id: p.id,\n        name: p.name,\n        sku: p.sku,\n        categoryLabel: CAT_LABEL[p.cat],\n        unit: p.unit,\n        priceDisplay: fmt(p.price),\n        oldPriceDisplay: p.oldPrice ? fmt(p.oldPrice) : \"\",\n        hasDiscount: !!p.oldPrice,\n        stockLabel: si.label,\n        stockBadgeBg: si.bg,\n        stockBadgeColor: si.color,\n        imgBg: im.bg,\n        imgStripe: im.stripe,\n        isEditing: editingId === p.id,\n        isNotEditing: editingId !== p.id,\n        editName,\n        editPrice,\n        editUnit,\n        editStock,\n        onEditNameChange: this.onEditNameChange,\n        onEditPriceChange: this.onEditPriceChange,\n        onEditUnitChange: this.onEditUnitChange,\n        onEditStockChange: this.onEditStockChange,\n        onStartEdit: () => this.startEdit(p),\n        onSaveEdit: () => this.saveEdit(p.id),\n      };\n    });\n\n    const discountCount = withOverrides.filter((p) => p.oldPrice).length;\n    const lowStockCount = withOverrides.filter((p) => p.stock <= 10).length;\n\n    const statCards = [\n      { label: \"สินค้าทั้งหมด\", value: withOverrides.length, color: \"oklch(0.4 0.02 60)\" },\n      { label: \"หมวดหมู่สินค้า\", value: CATEGORIES.length - 1, color: \"oklch(0.4 0.02 60)\" },\n      { label: \"รายการลดราคา\", value: discountCount, color: \"oklch(0.38 0.15 275)\" },\n      { label: \"สินค้าใกล้หมดสต็อก\", value: lowStockCount, color: \"oklch(0.5 0.15 30)\" },\n    ];\n\n    const gridActive = view === \"grid\";\n    const activeBtn = \"padding:7px 14px; border:none; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; background:#fff; color:oklch(0.3 0.01 60); box-shadow:0 1px 3px rgba(0,0,0,.08);\";\n    const inactiveBtn = \"padding:7px 14px; border:none; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; background:transparent; color:oklch(0.5 0.01 60);\";\n\n    const isRegisterMode = authMode === \"register\";\n\n    return {\n      isLoginScreen: !loggedIn,\n      isDashboard: loggedIn,\n      isRegisterMode,\n      hasAuthError: !!authError,\n      authErrorMessage: authError,\n      authSubtitle: isRegisterMode ? \"สร้างบัญชีผู้ใช้ใหม่\" : \"เข้าสู่ระบบแดชบอร์ดรายการราคาสินค้า\",\n      authSubmitLabel: isRegisterMode ? \"สร้างบัญชี\" : \"เข้าสู่ระบบ\",\n      authToggleQuestion: isRegisterMode ? \"มีบัญชีอยู่แล้ว?\" : \"ยังไม่มีบัญชี?\",\n      authToggleAction: isRegisterMode ? \"เข้าสู่ระบบ\" : \"สร้างผู้ใช้ใหม่\",\n      onToggleMode: this.onToggleMode,\n      username,\n      password,\n      confirmPassword,\n      onUsernameChange: this.onUsernameChange,\n      onPasswordChange: this.onPasswordChange,\n      onConfirmPasswordChange: this.onConfirmPasswordChange,\n      onSubmitAuth: this.onSubmitAuth,\n      onLogout: this.onLogout,\n      isPricePage,\n      isConcretePage,\n      goToPricePage: this.goToPricePage,\n      goToConcretePage: this.goToConcretePage,\n      priceNavBg: isPricePage ? \"oklch(0.62 0.17 45)\" : \"transparent\",\n      priceNavColor: isPricePage ? \"#fff\" : \"oklch(0.85 0.006 70)\",\n      priceNavWeight: isPricePage ? 700 : 500,\n      concreteNavBg: isConcretePage ? \"oklch(0.62 0.17 45)\" : \"transparent\",\n      concreteNavColor: isConcretePage ? \"#fff\" : \"oklch(0.85 0.006 70)\",\n      concreteNavWeight: isConcretePage ? 700 : 500,\n      isUsersPage,\n      goToUsersPage: this.goToUsersPage,\n      usersNavBg: isUsersPage ? \"oklch(0.62 0.17 45)\" : \"transparent\",\n      usersNavColor: isUsersPage ? \"#fff\" : \"oklch(0.85 0.006 70)\",\n      usersNavWeight: isUsersPage ? 700 : 500,\n      isContactPage,\n      goToContactPage: this.goToContactPage,\n      contactNavBg: isContactPage ? \"oklch(0.62 0.17 45)\" : \"transparent\",\n      contactNavColor: isContactPage ? \"#fff\" : \"oklch(0.85 0.006 70)\",\n      contactNavWeight: isContactPage ? 700 : 500,\n      newContactName,\n      newContactDept,\n      newContactPhone,\n      newContactAddress,\n      onNewContactNameChange: this.onNewContactNameChange,\n      onNewContactDeptChange: this.onNewContactDeptChange,\n      onNewContactPhoneChange: this.onNewContactPhoneChange,\n      onNewContactAddressChange: this.onNewContactAddressChange,\n      onAddContact: this.onAddContact,\n      hasContacts: contacts.length > 0,\n      isContactsEmpty: contacts.length === 0,\n      contactRows: contacts.map((c) => ({ ...c, onRemove: () => this.removeContact(c.id) })),\n      newUserName,\n      newUserPassword,\n      onNewUserNameChange: this.onNewUserNameChange,\n      onNewUserPasswordChange: this.onNewUserPasswordChange,\n      onAddUser: this.onAddUser,\n      hasUserError: !!userError,\n      userErrorMessage: userError,\n      userRows: users.map((u) => ({\n        username: u.username,\n        initial: u.username.charAt(0).toUpperCase(),\n        onRemove: () => this.removeUser(u.username),\n      })),\n      onUploadPdf: this.onUploadPdf,\n      hasConcreteFiles: concreteFiles.length > 0,\n      isConcreteEmpty: concreteFiles.length === 0,\n      concreteFiles: concreteFiles.map((f) => ({\n        ...f,\n        onRemove: () => this.removeConcreteFile(f.id),\n      })),\n      search,\n      category,\n      sortBy,\n      categoryOptions: CATEGORIES,\n      categoryOptionsNoAll: CATEGORIES.filter((c) => c.value !== \"all\"),\n      showAddForm,\n      addFormBtnLabel: showAddForm ? \"✕ ปิดฟอร์ม\" : \"+ เพิ่มสินค้า\",\n      newProdName,\n      newProdCat,\n      newProdPrice,\n      newProdUnit,\n      newProdStock,\n      newProdError,\n      onToggleAddForm: this.onToggleAddForm,\n      onAddProduct: this.onAddProduct,\n      onNewProdNameChange: this.onNewProdNameChange,\n      onNewProdCatChange: this.onNewProdCatChange,\n      onNewProdPriceChange: this.onNewProdPriceChange,\n      onNewProdUnitChange: this.onNewProdUnitChange,\n      onNewProdStockChange: this.onNewProdStockChange,\n      onSearchChange: this.onSearchChange,\n      onCategoryChange: this.onCategoryChange,\n      onSortChange: this.onSortChange,\n      setViewGrid: this.setViewGrid,\n      setViewList: this.setViewList,\n      gridBtnStyle: gridActive ? activeBtn : inactiveBtn,\n      listBtnStyle: !gridActive ? activeBtn : inactiveBtn,\n      isGridView: gridActive,\n      isListView: !gridActive,\n      isEmpty: products.length === 0,\n      resultCount: products.length,\n      products,\n      statCards,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
